<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>最简测试</title>
</head>
<body style="background:#000;color:#fff;font-family:monospace;padding:20px;">
    <h1>JavaScript 执行测试</h1>
    <div id="output"></div>
    
    <script>
        // 测试 1: JS 是否能运行
        const output = document.getElementById('output');
        
        output.innerHTML += '<div style="color:#0f0">✅ [TEST 1] 页面加载</div>';
        
        // 测试 2: Three.js 是否存在
        if (typeof THREE === 'undefined') {
            output.innerHTML += '<div style="color:#f00">❌ [TEST 2] THREE 未定义</div>';
        } else {
            output.innerHTML += '<div style="color:#0f0">✅ [TEST 2] THREE 已定义，版本: ' + THREE.REVISION + '</div>';
        }
        
        // 测试 3: 尝试创建场景
        try {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 10);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(100, 100);
            document.body.appendChild(renderer.domElement);
            
            // 创建一个简单的立方体
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const cube = new THREE.Mesh(geo, mat);
            scene.add(cube);
            camera.position.z = 3;
            renderer.render(scene, camera);
            
            // 如果到这里，说明 Three.js 可以工作
            output.innerHTML += '<div style="color:#0f0">✅ [TEST 3] Three.js 渲染成功（绿色立方体）</div>';
            
            // 2 秒后移除
            setTimeout(() => {
                document.body.removeChild(renderer.domElement);
                output.innerHTML += '<div style="color:#0f0">✅ [TEST 4] 测试画布已移除</div>';
                output.innerHTML += '<div style="color:#0f0">------ 如果看到这条，说明 Three.js 正常工作 ------</div>';
            }, 2000);
            
        } catch (e) {
            output.innerHTML += '<div style="color:#f00">❌ [TEST 3] Three.js 错误: ' + e.message + '</div>';
        }
    </script>
</body>
</html>
